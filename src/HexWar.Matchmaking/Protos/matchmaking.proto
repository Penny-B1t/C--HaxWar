syntax = "proto3";

option csharp_namespace = "HexWar.Matchmaking";

package matchmaking;

service MatchmakingService {
    // 매칭 큐에 참가 (서버 스트리밍: 매칭 완료까지 대기)
    // 서버 스트리밍을 통해 완료 신호 전달 SSE로 동작
    rpc JoinQueue(JoinQueueRequest) returns (stream MatchmakingUpdate);
    
    // 매칭 큐에서 나가기
    rpc LeaveQueue(LeaveQueueRequest) returns (LeaveQueueResponse);
    
    // 현재 큐 상태 확인
    rpc GetQueueStatus(GetQueueStatusRequest) returns (QueueStatus);
}

service GameRoomService {
    // 방 정보 조회
    rpc GetRoomInfo(GetRoomInfoRequest) returns (RoomInfo);
    
    // 활성 방 목록 조회 (관전용)
    rpc ListActiveRooms(ListActiveRoomsRequest) returns (ListActiveRoomsResponse);
}

// 메시지 구조체 정의

message JoinQueueRequest {
    string player_id = 1;
    int32 rating = 2;           // 등급 [추후]
}

message LeaveQueueRequest {
    string player_id = 1;
}

message LeaveQueueResponse {
    bool success = 1;
}

message GetQueueStatusRequest {
    string player_id = 1;
}

message QueueStatus {
    bool is_in_queue = 1;
    int32 queue_position = 2;
    int32 estimated_wait_seconds = 3;
    int32 players_in_queue = 4;
}

message MatchmakingUpdate {
    MatchmakingStatus status = 1;
    MatchFoundResult match_result = 2;  // status가 Matched일 때만 유효
    int32 queue_position = 3;
    int32 estimated_wait_seconds = 4;
}

enum MatchmakingStatus {
    SEARCHING = 0;      // 상대 찾는 중
    MATCHED = 1;        // 매칭 성공
    CANCELLED = 2;      // 취소됨
    TIMEOUT = 3;        // 시간 초과
    ERROR = 4;          // 오류 발생
}

message MatchFoundResult {
    string room_id = 1;
    string player_side = 2;     // "A" 또는 "B"
    string ws_endpoint = 3;     // WebSocket 연결 주소
    string opponent_id = 4;
}

message GetRoomInfoRequest {
    string room_id = 1;
}

message RoomInfo {
    string room_id = 1;
    string phase = 2;
    int32 current_round = 3;
    int32 player_count = 4;
    string created_at = 5;
}

message ListActiveRoomsRequest {
    int32 max_results = 1;
}

message ListActiveRoomsResponse {
    repeated RoomInfo rooms = 1;
}